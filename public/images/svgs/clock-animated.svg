<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#d4d4d8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="10" stroke-dasharray="63" stroke-dashoffset="63">
    <animate attributeName="stroke-dashoffset" values="63;0" dur="1s" fill="freeze"/>
  </circle>
  <polyline points="12 6 12 12 16 14" stroke-dasharray="14" stroke-dashoffset="14">
    <animate attributeName="stroke-dashoffset" values="14;0" dur="0.5s" begin="0.8s" fill="freeze"/>
  </polyline>
  <circle cx="12" cy="12" r="1" fill="#d4d4d8" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.2s" begin="1.2s" fill="freeze"/>
  </circle>
</svg>