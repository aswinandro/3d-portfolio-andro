<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 20" fill="none">
  <circle cx="4" cy="10" r="3" fill="#a855f7" opacity="0.8">
    <animate attributeName="r" values="3;4;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="4" cy="10" r="6" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.3">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <line x1="14" y1="10" x2="70" y2="10" stroke="#d4d4d8" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;20" dur="3s" repeatCount="indefinite"/>
  </line>
  <circle cx="76" cy="10" r="2" fill="#d4d4d8" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>