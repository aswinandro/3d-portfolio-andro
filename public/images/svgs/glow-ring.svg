<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(212,212,216,0.1)" stroke-width="1"/>
  <circle cx="20" cy="20" r="16" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="1.5s" fill="freeze" begin="0s"/>
    <animateTransform attributeName="transform" type="rotate" values="0 20 20;360 20 20" dur="20s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="20" r="12" fill="none" stroke="rgba(168,85,247,0.15)" stroke-width="0.5" stroke-dasharray="3 5">
    <animateTransform attributeName="transform" type="rotate" values="360 20 20;0 20 20" dur="15s" repeatCount="indefinite"/>
  </circle>
</svg>